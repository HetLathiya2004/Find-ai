feeds:
  finance:
    name: "Finance & Markets"
    url: "https://news.google.com/rss/search"
    handler: "google_news"
    function: "fetch_and_parse"
    params:
      q: "India finance stock market economy banking RBI SEBI"
      hl: "en-IN"
      gl: "IN"
      ceid: "IN:en"
    max_articles: 20
    trusted_domains:
      - moneycontrol.com
      - economictimes.com
      - economictimes.indiatimes.com
      - etnownews.com
      - livemint.com
      - ndtvprofit.com
      - business-standard.com
      - businesstoday.in
      - financialexpress.com
      - reuters.com
      - bloomberg.com
      - cnbc.com
      - cnbctv18.com
      - thehindu.com
      - fortune.com
      - forbes.com
      - yahoo.com
      - benzinga.com
      - fool.com
      - investmentexecutive.com
      - investors.com
      - tradingview.com
      - upstox.com

  startups:
    name: "Startups & Funding"
    url: "https://news.google.com/rss/search"
    handler: "google_news"
    function: "fetch_and_parse"
    params:
      q: "India startup funding venture capital unicorn"
      hl: "en-IN"
      gl: "IN"
      ceid: "IN:en"
    max_articles: 15
    trusted_domains:
      - inc42.com
      - yourstory.com
      - entrackr.com
      - economictimes.com
      - economictimes.indiatimes.com
      - etnownews.com
      - livemint.com
      - moneycontrol.com
      - businesstoday.in
      - reuters.com
      - bloomberg.com
      - forbes.com
      - fortune.com
      - siliconindia.com
      - tice.news

  global:
    name: "Global Markets"
    url: "https://news.google.com/rss/search"
    handler: "google_news"
    function: "fetch_and_parse"
    params:
      q: "global stock market wall street nasdaq S&P 500 dow jones international economy"
      hl: "en-IN"
      gl: "IN"
      ceid: "IN:en"
    max_articles: 15
    trusted_domains:
      - reuters.com
      - bloomberg.com
      - cnbc.com
      - financialexpress.com
      - livemint.com
      - moneycontrol.com
      - economictimes.com
      - economictimes.indiatimes.com
      - etnownews.com
      - businesstoday.in
      - ndtvprofit.com
      - fortune.com
      - forbes.com
      - yahoo.com
      - benzinga.com
      - fool.com
      - investors.com
      - tradingview.com
      - fxstreet.com
      - msn.com
      - ibtimes.com.au

